version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jakdata_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jakdata}
      POSTGRES_USER: ${POSTGRES_USER:-jakdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jakdata_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jakdata}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jakdata_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jakdata_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-jakdata}:${POSTGRES_PASSWORD:-jakdata_secret_2026}@postgres:5432/${POSTGRES_DB:-jakdata}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-jakdata_jwt_super_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      FONNTE_TOKEN: ${FONNTE_TOKEN:-}
    ports:
      - "3001:3001"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    container_name: jakdata_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
